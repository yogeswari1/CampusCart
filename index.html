<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusCart - Home | Student Stationery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-pencil-ruler"></i>
                <span>CampusCart</span>
            </div>
            <div class="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
            <div class="nav-links">
                <a href="index.html" class="active"><i class="fas fa-home"></i> Home</a>
                <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count" class="badge">0</span></a>
                <a href="wishlist.html"><i class="fas fa-heart"></i> Wishlist <span id="wish-count" class="badge">0</span></a>
                <a href="orders.html"><i class="fas fa-box"></i> Orders</a>
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
                <a href="profile.html"><i class="fas fa-user-graduate"></i> Profile</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="page-header">
            <h1>📚 Stationery Essentials</h1>
            <p class="section-subhead">Everything you need for academic success</p>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="product-grid-container">
            <!-- Products will be loaded dynamically -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p><i class="fas fa-book-open"></i> StudyCart · Student Stationery E-Commerce</p>
        </div>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
    <script src="pages.js"></script>
    
</body>
</html>
